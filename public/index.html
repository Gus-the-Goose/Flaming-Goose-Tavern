<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="theme-color" content="#d89a4a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Goose Tavern" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>The Flaming Goose Tavern 🦢🔥</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=OpenDyslexic&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Settings Modal -->
    <div id="settings-backdrop" class="modal-backdrop hidden" role="dialog" aria-label="Accessibility Settings">
      <div class="modal" role="document">
        <div class="modal-header">
          <h2>♿ Accessibility Settings</h2>
          <button id="settings-close" class="icon-btn" aria-label="Close settings">✕</button>
        </div>
        <div class="modal-body">
          <label>
            Font Size: <span id="font-size-val">18</span>px
            <input type="range" id="set-font-size" min="14" max="36" value="18" step="1" />
          </label>
          <label>
            Font Weight
            <select id="set-font-weight">
              <option value="400">Normal</option>
              <option value="700">Bold</option>
            </select>
          </label>
          <label>
            Font Family
            <select id="set-font-family">
              <option value="'Merriweather', Georgia, serif">Merriweather (Default)</option>
              <option value="'Atkinson Hyperlegible', sans-serif">Atkinson Hyperlegible</option>
              <option value="'OpenDyslexic', sans-serif">OpenDyslexic</option>
              <option value="system-ui, sans-serif">System UI</option>
              <option value="Georgia, serif">Georgia</option>
            </select>
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="set-high-contrast" />
            <span>High Contrast Mode</span>
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="set-reduce-motion" />
            <span>Reduce Motion</span>
          </label>
          <label>
            Accent Colour
            <input type="color" id="set-accent-color" value="#d89a4a" />
          </label>
          <label>
            Background Colour
            <input type="color" id="set-bg-color" value="#15110f" />
          </label>
          <label>
            Text Colour
            <input type="color" id="set-text-color" value="#f5ead8" />
          </label>
          <button id="settings-reset" class="secondary">Reset to Defaults</button>
        </div>
      </div>
    </div>

    <!-- Rules Reference Modal -->
    <div id="rules-backdrop" class="modal-backdrop hidden" role="dialog" aria-label="Rules Reference">
      <div class="modal modal-wide" role="document">
        <div class="modal-header">
          <h2>📖 Rules Reference</h2>
          <button id="rules-close" class="icon-btn" aria-label="Close rules">✕</button>
        </div>
        <div class="modal-body">
          <input type="search" id="rules-search" placeholder="Search rules..." aria-label="Search rules" />
          <div id="rules-content" class="rules-content"></div>
        </div>
      </div>
    </div>

    <!-- Campaign / Character Drawer -->
    <div id="drawer-backdrop" class="drawer-backdrop hidden"></div>
    <aside id="drawer" class="drawer hidden" role="complementary" aria-label="Campaign & Characters">
      <div class="drawer-header">
        <h2>📋 Campaign</h2>
        <button id="drawer-close" class="icon-btn" aria-label="Close drawer">✕</button>
      </div>
      <div class="drawer-tabs">
        <button class="drawer-tab active" data-tab="campaign">Campaign</button>
        <button class="drawer-tab" data-tab="characters">Characters</button>
      </div>
      <div class="drawer-body">
        <div id="tab-campaign" class="tab-content active">
          <form id="campaign-form" class="stack-form"></form>
        </div>
        <div id="tab-characters" class="tab-content">
          <div id="agents-list" class="agents-list"></div>
        </div>
      </div>
    </aside>

    <!-- Main Shell -->
    <div class="shell">
      <header class="hero">
        <div class="hero-text">
          <p class="eyebrow">The Flaming Goose Tavern</p>
          <h1 id="campaign-title">Loading table...</h1>
          <p id="campaign-setting" class="hero-copy"></p>
        </div>
        <div class="hero-actions">
          <button id="rules-btn" class="icon-btn" aria-label="Rules reference" title="Rules">📖</button>
          <button id="drawer-btn" class="icon-btn" aria-label="Campaign & characters" title="Menu">📋</button>
          <button id="settings-btn" class="icon-btn" aria-label="Accessibility settings" title="Settings">⚙️</button>
        </div>
      </header>

      <div id="scene-banner" class="scene-banner" role="status">
        <strong>Scene:</strong> <span id="scene-line">Loading...</span>
      </div>

      <!-- Dice Roller -->
      <section class="dice-bar" aria-label="Dice roller">
        <div class="dice-buttons">
          <button class="dice-btn" data-die="4" aria-label="Roll d4">d4</button>
          <button class="dice-btn" data-die="6" aria-label="Roll d6">d6</button>
          <button class="dice-btn" data-die="8" aria-label="Roll d8">d8</button>
          <button class="dice-btn" data-die="10" aria-label="Roll d10">d10</button>
          <button class="dice-btn" data-die="12" aria-label="Roll d12">d12</button>
          <button class="dice-btn" data-die="20" aria-label="Roll d20">d20</button>
        </div>
        <div class="dice-modifier">
          <label>
            ± Mod
            <input type="number" id="dice-mod" value="0" />
          </label>
        </div>
        <div id="dice-result" class="dice-result hidden" role="alert" aria-live="assertive"></div>
      </section>

      <!-- Game Log -->
      <main class="panel-log" aria-label="Game log">
        <div id="log-list" class="log-list" role="log" aria-live="polite"></div>
      </main>

      <!-- Message Input -->
      <form id="message-form" class="message-form" aria-label="Send message">
        <div class="form-row">
          <label class="sr-only" for="audience-select">Audience</label>
          <select id="audience-select" name="audience">
            <option value="all">Whole table</option>
            <option value="one">One character</option>
          </select>
          <label id="target-wrap" class="hidden">
            <span class="sr-only">Target character</span>
            <select id="target-select" name="targetAgentId"></select>
          </label>
          <label class="ooc-toggle">
            <input type="checkbox" id="ooc-toggle" name="messageMode" value="ooc" />
            <span>OOC / Jason note</span>
          </label>
        </div>
        <div class="form-row">
          <label class="sr-only" for="message-input">Your message</label>
          <textarea
            id="message-input"
            name="text"
            rows="2"
            placeholder="Address the table..."
          ></textarea>
          <button type="submit" class="send-btn" aria-label="Send">➤</button>
        </div>
      </form>
    </div>

    <template id="log-entry-template">
      <article class="log-entry" tabindex="0">
        <div class="log-meta">
          <strong class="log-speaker"></strong>
          <span class="log-target"></span>
          <span class="log-time"></span>
        </div>
        <p class="log-text"></p>
        <button class="tts-btn icon-btn small" aria-label="Read aloud" title="Read aloud">🔊</button>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
